name: Build & Release APK

# Triggers on every push to main — which includes PR merges
on:
  push:
    branches: [ main ]

# Needed so the workflow can create GitHub Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Install Gradle 8.7 (required by Android Gradle Plugin 8.4.0)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # Install the Android SDK platform and build-tools matching compileSdk=34
      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build debug APK
        run: gradle assembleDebug

      # Attach the APK to a new GitHub Release named "Build #N"
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build triggered by merge to `main`.

            **Commit:** `${{ github.sha }}`
            **Message:** ${{ github.event.head_commit.message }}

            ---

            ### Install on your phone
            1. Tap **app-debug.apk** below to download it
            2. Open the downloaded file
            3. If prompted, allow **"Install unknown apps"** for your browser/file manager
            4. Tap **Install**
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
